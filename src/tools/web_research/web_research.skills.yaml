name: web_research
displayName: 在线研究
version: "1.0.0"
description: 深度联网搜索、网页提取与自动重点整理

triggers:
  keywords:
    - 联网查
    - 在线查
    - 查资料
    - 深度搜索
    - 深入搜索
    - 在线研究
    - 在线调研
    - 搜索
    - 最新
    - 新闻
    - 资料

permissions:
  allowGroups: all
  allowPrivate: true

cooldown:
  perUser: 0
  global: 0

onError:
  - condition: "error.message.includes('timeout')"
    response: "在线研究超时了，建议缩小问题范围后再试。"
